name: Stale Branch Cleanup

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const protectedBranches = ['main'];
            const staleDays = 30;
            const cutoff = new Date(Date.now() - staleDays * 24 * 60 * 60 * 1000);

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner, repo, per_page: 100
            });

            let deleted = 0;
            let kept = 0;

            for (const branch of branches) {
              if (branch.protected || protectedBranches.includes(branch.name)) {
                console.log(`KEEP (protected): ${branch.name}`);
                kept++;
                continue;
              }

              const { data: prs } = await github.rest.pulls.list({
                owner, repo, head: `${owner}:${branch.name}`, state: 'open'
              });

              if (prs.length > 0) {
                console.log(`KEEP (open PR #${prs[0].number}): ${branch.name}`);
                kept++;
                continue;
              }

              const { data: commit } = await github.rest.repos.getCommit({
                owner, repo, ref: branch.name
              });

              const commitDate = new Date(commit.commit.committer.date);
              if (commitDate < cutoff) {
                console.log(`DELETE (stale ${Math.floor((Date.now() - commitDate) / 86400000)}d): ${branch.name}`);
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch.name}` });
                deleted++;
              } else {
                console.log(`KEEP (recent): ${branch.name}`);
                kept++;
              }
            }

            console.log(`\nSummary: ${deleted} deleted, ${kept} kept`);
